<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEED - Smart Billing System</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Courier New', monospace; background: #f4f4f4; padding: 10px; margin: 0; }
        .container { max-width: 400px; margin: auto; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        #reader { width: 100%; border: 3px solid #000; border-radius: 8px; background: #000; overflow: hidden; margin-bottom: 15px; }
        
        #new-product-form { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 20px; border: 2px solid #000; border-radius: 10px; z-index: 1000; width: 85%; 
        }
        #new-product-form input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; }

        /* 80mm Thermal Paper Optimized Style */
        #invoice-box { 
            width: 75mm; /* কাগজের ভেতরে রাখার জন্য কমানো হয়েছে */
            padding: 2mm; 
            margin: auto; 
            background: #fff; 
            color: #000; 
        }
        .header { text-align: center; border-bottom: 1px dashed #000; padding-bottom: 8px; margin-bottom: 10px; }
        .header h2 { margin: 5px 0; font-size: 18px; text-transform: uppercase; }
        .header p { margin: 2px 0; font-size: 10px; }
        
        /* Table Structure Fixes */
        table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 10px; /* ফন্ট সাইজ কমিয়ে ১০ করা হয়েছে */
            table-layout: fixed; 
        }
        th, td { 
            padding: 4px 2px; 
            border-bottom: 0.5px solid #eee; 
            vertical-align: top; 
            word-wrap: break-word; /* লম্বা লেখা নিচের লাইনে পাঠাতে */
            overflow: hidden;
        }
        th { border-bottom: 1px solid #000; font-weight: bold; }
        
        /* কলামের উইডথ পিক্সেল দিয়ে ফিক্সড করা হয়েছে */
        .col-item { width: 110px; text-align: left; }
        .col-qty { width: 40px; text-align: center; }
        .col-price { width: 70px; text-align: right; }

        .qty-input { width: 25px; text-align: center; border: 1px solid #ccc; font-size: 10px; }
        .total-area { border-top: 1px solid #000; margin-top: 10px; padding-top: 8px; text-align: right; font-weight: bold; font-size: 14px; }
        
        .btn-group { display: flex; gap: 8px; margin-top: 20px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-save { background: #000; color: gold; }
        .btn-clear { background: #ff4444; color: white; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; }
    </style>
</head>
<body>

<div class="overlay" id="overlay"></div>

<div class="container">
    <div id="reader"></div>

    <div id="new-product-form">
        <h3>New Item!</h3>
        <p>Code: <span id="new-barcode" style="color:red;"></span></p>
        <input type="text" id="new-name" placeholder="Item Name">
        <input type="number" id="new-price" placeholder="Price">
        <div style="display:flex; gap:5px;">
            <button class="btn-save" onclick="saveNewProduct()">ADD</button>
            <button style="background:#ddd" onclick="closeForm()">CANCEL</button>
        </div>
    </div>

    <div id="invoice-box">
        <div class="header">
            <h2>NEED - নিড</h2>
            <p>চানখারপুল, ৩৭ নবাব কাটারা, নিমতলী</p>
            <p>মোবাইল: +880 1616-538522</p>
        </div>

        <table>
            <thead>
                <tr>
                    <th class="col-item">Item</th>
                    <th class="col-qty">Qty</th>
                    <th class="col-price">Total</th>
                </tr>
            </thead>
            <tbody id="bill-items"></tbody>
        </table>

        <div class="total-area">GRAND TOTAL: <span id="grand-total">0</span> BDT</div>
    </div>

    <div class="btn-group">
        <button class="btn-save" onclick="generatePDF()">SAVE RECEIPT 📥</button>
        <button class="btn-clear" onclick="resetCart()">RESET 🗑️</button>
    </div>
</div>

<script>
    let products = JSON.parse(localStorage.getItem('need_inventory')) || {};
    let cart = {};
    let lastScan = 0;

    function onScanSuccess(decodedText) {
        if (Date.now() - lastScan > 2000) {
            if (navigator.vibrate) navigator.vibrate(100);
            if (products[decodedText]) addToCart(decodedText);
            else showNewProductForm(decodedText);
            lastScan = Date.now();
        }
    }

    function addToCart(code) {
        if (cart[code]) cart[code].qty += 1;
        else cart[code] = { ...products[code], qty: 1 };
        renderTable();
    }

    function showNewProductForm(code) {
        document.getElementById('new-barcode').innerText = code;
        document.getElementById('new-product-form').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
        window.pendingCode = code;
    }

    function saveNewProduct() {
        const name = document.getElementById('new-name').value;
        const price = document.getElementById('new-price').value;
        if (name && price) {
            products[window.pendingCode] = { name, price: parseInt(price) };
            localStorage.setItem('need_inventory', JSON.stringify(products));
            addToCart(window.pendingCode);
            closeForm();
        }
    }

    function closeForm() {
        document.getElementById('new-product-form').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
    }

    function renderTable() {
        const tbody = document.getElementById('bill-items');
        tbody.innerHTML = "";
        let total = 0;
        for (let code in cart) {
            const item = cart[code];
            const sub = item.price * item.qty;
            total += sub;
            tbody.innerHTML += `
                <tr>
                    <td class="col-item">${item.name}</td>
                    <td class="col-qty"><input type="number" class="qty-input" value="${item.qty}" onchange="updateQty('${code}', this.value)"></td>
                    <td class="col-price">${sub}</td>
                </tr>`;
        }
        document.getElementById('grand-total').innerText = total;
    }

    function updateQty(code, val) {
        if (parseInt(val) <= 0) delete cart[code];
        else cart[code].qty = parseInt(val);
        renderTable();
    }

    function startScanner() {
        new Html5Qrcode("reader").start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, onScanSuccess);
    }
    window.onload = startScanner;

    function generatePDF() {
        const element = document.getElementById('invoice-box');
        
        // পিডিএফ করার সময় ইনপুট বক্স সরিয়ে শুধু টেক্সট রাখা (Alignment Fix)
        const inputs = element.querySelectorAll('.qty-input');
        inputs.forEach(input => {
            const span = document.createElement('span');
            span.innerText = input.value;
            input.parentNode.replaceChild(span, input);
        });

        const opt = {
            margin: [7, 2, 5, 2],
            filename: 'NEED_Bill.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 3, useCORS: true, windowWidth: 280 }, // মোবাইল উইন্ডো ফিক্স
            jsPDF: { unit: 'mm', format: [90, 160], orientation: 'portrait' }
        };

        html2pdf().set(opt).from(element).save().then(() => {
            renderTable(); // সেভ শেষে ইনপুট বক্স ফেরত আনা
        });
    }

    function resetCart() { if(confirm("Reset?")) { cart={}; renderTable(); } }
</script>
</body>
</html>
