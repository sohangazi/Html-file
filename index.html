<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEED - Smart Inventory & Billing</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Courier New', monospace; background: #f4f4f4; padding: 10px; margin: 0; }
        .container { max-width: 400px; margin: auto; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #reader { width: 100%; border: 3px solid #000; border-radius: 8px; background: #000; overflow: hidden; }
        
        /* Modal for New Product */
        #new-product-form { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 20px; border: 2px solid gold; border-radius: 10px; z-index: 1000; width: 80%;
        }
        input { width: 90%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; }
        
        #invoice-box { width: 80mm; padding: 10px; margin: auto; background: #fff; }
        .header { text-align: center; border-bottom: 1px dashed #000; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
        th { border-bottom: 1px solid #000; text-align: left; padding: 5px 0; }
        td { padding: 8px 0; border-bottom: 0.5px solid #eee; }
        .qty-input { width: 40px; text-align: center; font-weight: bold; }
        .total-area { border-top: 2px solid #000; margin-top: 15px; padding-top: 10px; text-align: right; font-weight: bold; font-size: 18px; }
        .btn-group { display: flex; gap: 8px; margin-top: 20px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-save { background: #000; color: gold; }
        .btn-clear { background: #ff4444; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div id="reader"></div>

    <div id="new-product-form">
        <h3>New Product Found!</h3>
        <p>Barcode: <span id="new-barcode"></span></p>
        <input type="text" id="new-name" placeholder="Product Name">
        <input type="number" id="new-price" placeholder="Price (BDT)">
        <button class="btn-save" onclick="saveNewProduct()">Add to Inventory</button>
        <button style="background:#ddd" onclick="closeForm()">Cancel</button>
    </div>

    <div id="invoice-box">
        <div class="header">
            <h2>NEED - নিড</h2>
            <p>চানখারপুল, ৩৭ নবাব কাটারা, নিমতলী</p>
            <p>মোবাইল: +880 1616-538522</p>
        </div>
        <table>
            <thead><tr><th>Item</th><th>Qty</th><th>Price</th></tr></thead>
            <tbody id="bill-items"></tbody>
        </table>
        <div class="total-area">TOTAL: <span id="grand-total">0</span> BDT</div>
    </div>

    <div class="btn-group">
        <button class="btn-save" onclick="generatePDF()">SAVE RECEIPT 📥</button>
        <button class="btn-clear" onclick="resetCart()">RESET CART 🗑️</button>
    </div>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBeep() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = 1000; gain.gain.value = 0.1;
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    // Load products from localStorage or use default
    let products = JSON.parse(localStorage.getItem('need_inventory')) || {
        "12345678": { name: "NEED Premium", price: 1200 }
    };

    let cart = {};
    let lastScan = 0;
    let pendingBarcode = "";

    function onScanSuccess(decodedText) {
        const now = Date.now();
        if (now - lastScan > 2000) {
            playBeep();
            if (navigator.vibrate) navigator.vibrate(100);
            
            if (products[decodedText]) {
                addToCart(decodedText);
            } else {
                showNewProductForm(decodedText);
            }
            lastScan = now;
        }
    }

    function addToCart(code) {
        if (cart[code]) cart[code].qty += 1;
        else cart[code] = { ...products[code], qty: 1 };
        renderTable();
    }

    function showNewProductForm(code) {
        pendingBarcode = code;
        document.getElementById('new-barcode').innerText = code;
        document.getElementById('new-product-form').style.display = 'block';
    }

    function saveNewProduct() {
        const name = document.getElementById('new-name').value;
        const price = document.getElementById('new-price').value;

        if (name && price) {
            products[pendingBarcode] = { name: name, price: parseInt(price) };
            localStorage.setItem('need_inventory', JSON.stringify(products));
            addToCart(pendingBarcode);
            closeForm();
        } else {
            alert("Please enter name and price");
        }
    }

    function closeForm() {
        document.getElementById('new-product-form').style.display = 'none';
        document.getElementById('new-name').value = '';
        document.getElementById('new-price').value = '';
    }

    function renderTable() {
        const tbody = document.getElementById('bill-items');
        tbody.innerHTML = "";
        let total = 0;
        for (let code in cart) {
            const item = cart[code];
            const sub = item.price * item.qty;
            total += sub;
            tbody.innerHTML += `<tr><td>${item.name}</td><td>${item.qty}</td><td>${sub}</td></tr>`;
        }
        document.getElementById('grand-total').innerText = total;
    }

    function startAutoScanner() {
        const html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, onScanSuccess);
    }

    window.onload = startAutoScanner;

    function generatePDF() {
        const element = document.getElementById('invoice-box');
        html2pdf().set({
            margin: 5, filename: 'NEED_Bill.pdf',
            jsPDF: { unit: 'mm', format: [80, 150], orientation: 'portrait' }
        }).from(element).save();
    }

    function resetCart() {
        cart = {}; renderTable();
    }
</script>
</body>
</html>
